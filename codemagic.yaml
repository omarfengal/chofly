# ═════════════════════════════════════════════════════════════════════
# CHOFLY — codemagic.yaml  (version minimale robuste)
# FIX5: Réduit à 1 workflow, 1 groupe de secrets, 0 dépendances superflues
# Flutter stable | Gradle 8.4 | AGP 8.2.2 | Java 17
# ═════════════════════════════════════════════════════════════════════

workflows:
  android-apk:
    name: "Android Debug APK"
    max_build_duration: 40

    environment:
      flutter: stable
      java: 17
      groups:
        - firebase_credentials

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "*"
          include: true

    scripts:
      - name: "Inject google-services.json"
        script: |
          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > "$CM_BUILD_DIR/android/app/google-services.json"

      - name: "Fix gradlew permissions"
        script: chmod +x android/gradlew

      - name: "Flutter pub get"
        script: flutter pub get

      - name: "Build APK debug"
        script: flutter build apk --debug --no-pub

    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
