# ═════════════════════════════════════════════════════════════════════
# CHOFLY — codemagic.yaml  (version minimale robuste)
# FIX5: Réduit à 1 workflow, 1 groupe de secrets, 0 dépendances superflues
# Flutter stable | Gradle 8.4 | AGP 8.2.2 | Java 17
# ═════════════════════════════════════════════════════════════════════

workflows:

  android-apk:
    name: "Android — Debug APK"
    max_build_duration: 40
    instance_type: mac_mini_m2

    environment:
      flutter: stable
      java: 17
      groups:
        # Seul groupe requis : contient GOOGLE_SERVICES_JSON (base64 du fichier)
        # Créer sur Codemagic : Teams → Variables → Group "firebase_credentials"
        - firebase_credentials
      vars:
        PACKAGE_NAME: "com.chofly.app"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: "*"
          include: true

    scripts:
      - name: "Inject google-services.json"
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode \
            > $CM_BUILD_DIR/android/app/google-services.json

      - name: "Fix gradlew permissions"
        script: chmod +x android/gradlew

      - name: "Flutter pub get"
        script: flutter pub get

      - name: "Flutter analyze"
        script: flutter analyze --no-pub
        ignore_failure: true

      - name: "Build APK debug"
        script: |
          flutter build apk \
            --debug \
            --no-pub

    artifacts:
      - build/app/outputs/apk/debug/app-debug.apk

    publishing:
      email:
        recipients:
          - dev@chofly.dz
        notify:
          success: true
          failure: true
