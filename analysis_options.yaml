# ─────────────────────────────────────────────────────────────────────
# CHOFLY — Dart analysis options
# ─────────────────────────────────────────────────────────────────────
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Traiter comme erreurs — pas de code cassé en prod
    missing_required_param: error
    missing_return: error
    dead_code: warning
    unused_import: warning
    unused_local_variable: warning
  exclude:
    - "**/*.g.dart"       # fichiers générés
    - "**/*.freezed.dart"
    - lib/firebase_options.dart

linter:
  rules:
    # Qualité
    - always_declare_return_types
    - avoid_empty_else
    - avoid_print             # utiliser debugPrint ou un logger
    - avoid_relative_lib_imports
    - avoid_returning_null_for_future
    - avoid_slow_async_io
    - cancel_subscriptions
    - close_sinks
    - no_duplicate_case_values
    - prefer_const_constructors
    - prefer_const_declarations
    - prefer_final_fields
    - prefer_final_locals
    - prefer_is_empty
    - prefer_is_not_empty
    - sized_box_for_whitespace
    - use_build_context_synchronously: false  # désactivé — trop de faux positifs avec async/await Firebase
    - use_key_in_widget_constructors
    # Style
    - curly_braces_in_flow_control_structures
    - eol_at_end_of_file
