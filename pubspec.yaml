name: chofly
description: On-demand home maintenance service platform for Algeria.
publish_to: 'none'
version: 2.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase — dernières versions stables (avril 2026)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.3
  firebase_analytics: ^11.3.3

  # State management
  provider: ^6.1.2

  # UI — minimal, natif autant que possible
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1

  # Utils
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2   # persistance thème + préfs
  pinput: ^3.0.1
  permission_handler: ^11.3.1
  geolocator: ^12.0.0
  google_maps_flutter: ^2.9.0
  uuid: ^4.5.1
  share_plus: ^10.0.3
  path_provider: ^2.1.2
  pdf: ^3.10.8
  printing: ^5.12.0
  flutter_local_notifications: ^16.3.2
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  fake_cloud_firestore: ^3.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
